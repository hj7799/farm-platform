// ===== Website Visit Analytics =====
function getVisitData() { return JSON.parse(localStorage.getItem('farm_analytics') || '{"visits":[],"daily":{},"devices":{},"firstVisit":null}'); }
function saveVisitData(data) { localStorage.setItem('farm_analytics', JSON.stringify(data)); }
function detectDevice() {
  const ua = navigator.userAgent;
  if (/iPad|Tablet|PlayBook/i.test(ua)) return 'tablet';
  if (/Mobile|Android|iPhone|iPod|Windows Phone/i.test(ua)) return 'mobile';
  return 'desktop';
}
function detectBrowser() {
  const ua = navigator.userAgent;
  if (/Edg/i.test(ua)) return 'Edge';
  if (/Chrome/i.test(ua)) return 'Chrome';
  if (/Firefox/i.test(ua)) return 'Firefox';
  if (/Safari/i.test(ua)) return 'Safari';
  return '其他';
}
function formatDateKey(ts) { const d = new Date(ts); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getVisitorId() {
  let id = localStorage.getItem('farm_visitor_id');
  if (!id) { id = 'v_'+Date.now().toString(36)+Math.random().toString(36).substr(2,6); localStorage.setItem('farm_visitor_id', id); }
  return id;
}
function trackVisit() {
  const data = getVisitData();
  const now = Date.now();
  const todayKey = formatDateKey(now);
  const visitorId = getVisitorId();
  const device = detectDevice();
  const browser = detectBrowser();
  if (!data.firstVisit) data.firstVisit = now;
  data.visits.push({ ts: now, device: device, browser: browser, visitorId: visitorId, screen: window.innerWidth+'x'+window.innerHeight, referrer: document.referrer || '直接访问' });
  if (data.visits.length > 500) data.visits = data.visits.slice(-500);
  data.daily[todayKey] = (data.daily[todayKey] || 0) + 1;
  data.devices[device] = (data.devices[device] || 0) + 1;
  saveVisitData(data);
  updateSidebarVisitBadge(data);
}
function updateSidebarVisitBadge(data) {
  if (!data) data = getVisitData();
  const total = data.visits.length;
  const todayKey = formatDateKey(Date.now());
  const today = data.daily[todayKey] || 0;
  const el1 = document.getElementById('sidebarVisitCount');
  const el2 = document.getElementById('sidebarTodayCount');
  if (el1) el1.textContent = total;
  if (el2) el2.textContent = today;
}
function openAnalytics() { renderAnalytics(); document.getElementById('analyticsOverlay').classList.add('show'); }
function closeAnalytics() { document.getElementById('analyticsOverlay').classList.remove('show'); }
function renderAnalytics() {
  const data = getVisitData();
  const total = data.visits.length;
  const todayKey = formatDateKey(Date.now());
  const today = data.daily[todayKey] || 0;
  let weekCount = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = formatDateKey(d.getTime());
    weekCount += (data.daily[key] || 0);
  }
  const dayKeys = Object.keys(data.daily).sort();
  const trackedDays = dayKeys.length || 1;
  const avg = Math.round(total / trackedDays);
  document.getElementById('acTotal').textContent = total;
  document.getElementById('acToday').textContent = today;
  document.getElementById('acWeek').textContent = weekCount;
  document.getElementById('acAvg').textContent = avg;
  const barChart = document.getElementById('barChart');
  const dayLabels = ['周日','周一','周二','周三','周四','周五','周六'];
  let barHtml = '';
  let maxVal = 1;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = formatDateKey(d.getTime());
    const count = data.daily[key] || 0;
    if (count > maxVal) maxVal = count;
  }
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = formatDateKey(d.getTime());
    const count = data.daily[key] || 0;
    const heightPct = (count / maxVal) * 100;
    const isToday = i === 0;
    const label = i === 0 ? '今天' : i === 1 ? '昨天' : dayLabels[d.getDay()];
    barHtml += '<div class="bar-col"><div class="bar'+(isToday?' today-bar':'')+'" style="height:'+heightPct+'%;"><span class="bar-val">'+count+'</span></div><div class="bar-label">'+label+'</div></div>';
  }
  barChart.innerHTML = barHtml;
  const deviceNames = { mobile:'手机', desktop:'电脑', tablet:'平板' };
  const deviceIcons = { mobile:'fa-mobile-alt', desktop:'fa-desktop', tablet:'fa-tablet-alt' };
  const deviceColors = { mobile:'#1565c0', desktop:'#2e7d32', tablet:'#e65100' };
  let deviceHtml = '';
  const totalDevices = Object.values(data.devices).reduce((s,v) => s+v, 0) || 1;
  Object.keys(data.devices).forEach(dev => {
    const count = data.devices[dev];
    const pct = (count / totalDevices) * 100;
    deviceHtml += '<div class="device-row"><div class="device-icon" style="color:'+deviceColors[dev]+'"><i class="fas '+deviceIcons[dev]+'"></i></div><div class="device-info"><div class="device-name">'+deviceNames[dev]+' <span style="color:var(--text-light);font-weight:400;font-size:11px;">('+pct.toFixed(0)+'%)</span></div><div class="device-bar"><div class="device-bar-fill" style="width:'+pct+'%;background:'+deviceColors[dev]+';"></div></div></div><div class="device-count">'+count+'</div></div>';
  });
  if (!deviceHtml) deviceHtml = '<div class="visit-log-empty">暂无设备数据</div>';
  document.getElementById('deviceBreakdown').innerHTML = deviceHtml;
  const recentVisits = data.visits.slice(-15).reverse();
  let logHtml = '';
  if (recentVisits.length === 0) {
    logHtml = '<div class="visit-log-empty">暂无访问记录</div>';
  } else {
    recentVisits.forEach(v => {
      const d = new Date(v.ts);
      const timeStr = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      const deviceName = deviceNames[v.device] || v.device;
      logHtml += '<div class="visit-log-item"><div class="vl-icon"><i class="fas '+(deviceIcons[v.device]||'fa-user')+'" style="color:'+(deviceColors[v.device]||'#666')+'"></i></div><div class="vl-info"><div class="vl-time">'+timeStr+'</div><div class="vl-meta">'+deviceName+' · '+v.browser+' · '+v.screen+' · '+v.referrer+'</div></div></div>';
    });
  }
  document.getElementById('visitLog').innerHTML = logHtml;
  if (data.firstVisit) {
    const fd = new Date(data.firstVisit);
    document.getElementById('analyticsSince').textContent = '统计开始：'+(fd.getFullYear())+'-'+String(fd.getMonth()+1).padStart(2,'0')+'-'+String(fd.getDate()).padStart(2,'0')+'，共记录 '+total+' 次访问';
  } else {
    document.getElementById('analyticsSince').textContent = '暂无统计数据';
  }
}
function resetAnalytics() {
  if (!confirm('确定要清空所有访问统计数据吗？此操作不可撤销。')) return;
  localStorage.removeItem('farm_analytics');
  localStorage.removeItem('farm_visitor_id');
  trackVisit();
  renderAnalytics();
  showToast('访问统计已重置', 'success');
}

// ===== Init =====
trackVisit();
if (!localStorage.getItem('farmDataV2')) {
  localStorage.removeItem('farms');
  localStorage.setItem('farmDataV2', '1');
}
if (initAuth()) {
  renderAll();
  const farmsWithCoords = farms.filter(f => f.lat && f.lng);
  if (farmsWithCoords.length > 0) {
    const bounds = L.latLngBounds(farmsWithCoords.map(f => [f.lat, f.lng]));
    map.fitBounds(bounds, { padding:[40,40] });
  }
}
</script>
